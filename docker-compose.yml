version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: apt_mongo
    ports:
      - '27017:27017'
    command: ['--replSet', 'rs0', '--bind_ip_all']
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7
    container_name: apt_mongo_init
    depends_on:
      mongo:
        condition: service_healthy
    restart: 'no'
    entrypoint: >
      mongosh --host mongo:27017 --eval
      "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] })"

volumes:
  mongo_data:
