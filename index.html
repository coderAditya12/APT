<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Friend Requests</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        #notifications { background: #f9f9f9; padding: 10px; min-height: 100px; }
        .alert { color: green; font-weight: bold; margin: 5px 0; }
    </style>
</head>
<body>

    <h2>My Social App</h2>

    <div class="box" id="loginBox">
        <label>Who are you?</label>
        <input type="text" id="myUsername" placeholder="e.g., alice">
        <button onclick="connectToSSE()">Login</button>
    </div>

    <div class="box" id="actionBox" style="display:none;">
        <p>Logged in as: <strong id="displayUsername"></strong></p>
        <hr>
        <label>Send friend request to:</label>
        <input type="text" id="targetUsername" placeholder="e.g., bob">
        <button onclick="sendFriendRequest()">Send Request</button>
    </div>

    <div class="box">
        <h3>Live Notifications 🔔</h3>
        <div id="notifications">Waiting for notifications...</div>
    </div>

    <script>
        let myName = "";

        // 1. Connect to the SSE endpoint
        function connectToSSE() {
            myName = document.getElementById("myUsername").value.trim().toLowerCase();
            if (!myName) return alert("Please enter a username!");

            // Hide login, show actions
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("actionBox").style.display = "block";
            document.getElementById("displayUsername").innerText = myName;

            // Start listening for Server-Sent Events!
            const eventSource = new EventSource(`/events/${encodeURIComponent(myName)}`);

            // Whenever the server does res.write(), this function fires instantly!
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                // Add the new message to our notification box WITHOUT reloading
                const notifDiv = document.getElementById("notifications");
                const newMessage = document.createElement("p");
                newMessage.className = "alert";
                newMessage.innerText = data.message;
                
                // Add it to the top of the list
                notifDiv.prepend(newMessage); 
            };

            eventSource.onerror = function() {
                document.getElementById("notifications").innerText =
                    "Connection lost. Make sure the backend server is running.";
            };
        }

        // 2. Send a request to the backend
        async function sendFriendRequest() {
            const target = document.getElementById("targetUsername").value.trim().toLowerCase();
            if (!target) return alert("Who are you sending this to?");

            // Send a standard POST request. Our SSE connection stays open in the background!
            const response = await fetch("/send-request", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ fromUser: myName, toUser: target })
            });

            if (!response.ok) {
                alert("Could not send the friend request.");
                return;
            }

            document.getElementById("targetUsername").value = ""; // Clear input
        }
    </script>
</body>
</html>
